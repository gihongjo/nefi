---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nefi-agent
  namespace: nefi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nefi-agent
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nefi-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nefi-agent
subjects:
  - kind: ServiceAccount
    name: nefi-agent
    namespace: nefi
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nefi-agent
  namespace: nefi
spec:
  selector:
    matchLabels:
      app: nefi-agent
  template:
    metadata:
      labels:
        app: nefi-agent
    spec:
      serviceAccountName: nefi-agent
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # Only deploy to nodes labelled: nefi-agent=enabled
      # kubectl label node <node-name> nefi-agent=enabled
      nodeSelector:
        nefi-agent: enabled
      containers:
        - name: nefi-agent
          image: ghcr.io/gihongjo/nefi-agent:latest
          args:
            - --server-addr=nefi-server.nefi.svc.cluster.local:9090
          securityContext:
            privileged: true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: sys-kernel-debug
              mountPath: /sys/kernel/debug
              readOnly: true
            - name: sys-fs-bpf
              mountPath: /sys/fs/bpf
            - name: lib-modules
              mountPath: /lib/modules
              readOnly: true
            - name: usr-src
              mountPath: /usr/src
              readOnly: true
      volumes:
        - name: sys-kernel-debug
          hostPath:
            path: /sys/kernel/debug
        - name: sys-fs-bpf
          hostPath:
            path: /sys/fs/bpf
        - name: lib-modules
          hostPath:
            path: /lib/modules
        - name: usr-src
          hostPath:
            path: /usr/src
